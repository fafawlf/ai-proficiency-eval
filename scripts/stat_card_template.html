<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI proficiency · @@name_en@@</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#141210;--card:#1f1d1a;--ink:#ECE8E0;--mut:#9d988c;--dim:#6b675e;--gold:#E0C48A;--line:rgba(255,255,255,.09);
--serif:'Fraunces',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:var(--sans);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px}
.kick{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}
.card{width:460px;max-width:100%;background:var(--card);border:0.5px solid var(--line);border-radius:24px;padding:26px 28px 22px;position:relative}
.card::after{content:"";position:absolute;inset:7px;border:0.5px solid var(--line);border-radius:18px;pointer-events:none}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{font-family:var(--serif);font-size:18px;color:var(--gold);font-style:italic}
.tag{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#2a2620;background:var(--gold);border-radius:20px;padding:4px 11px;font-weight:500}
.name{font-family:var(--serif);font-weight:300;font-size:38px;line-height:1;letter-spacing:-.01em}
.zh{font-family:var(--serif);font-size:16px;margin-top:6px;color:var(--ink)}
.sub{font-size:11.5px;color:var(--mut);margin-top:3px}
.radar{display:block;width:100%;height:auto;margin:6px 0 2px}
.rt{font-family:var(--sans);font-size:9.5px;fill:var(--mut)}
.rs{font-family:var(--sans);font-size:10px;font-weight:500;fill:var(--ink)}
.gauges{display:flex;justify-content:space-between;gap:10px;margin:8px 0 16px}
.g{flex:1;text-align:center}.g svg{width:74px;height:74px}
.gnum{font-family:var(--serif);font-size:17px;fill:var(--ink)}
.gl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-top:4px}
.sec{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:0 0 7px}
.bar{display:flex;height:9px;border-radius:6px;overflow:hidden;gap:2px}
.bar i{display:block}
.blabs{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:6px}
.blabs b{color:var(--ink);font-weight:500}
.thru{display:flex;align-items:baseline;gap:8px;margin-top:12px}
.thru .n{font-family:var(--serif);font-size:20px}
.foot{border-top:0.5px solid var(--line);margin-top:16px;padding-top:13px}
.sig{font-family:var(--serif);font-size:13.5px;font-style:italic;color:var(--mut);line-height:1.5}
.chips{display:flex;gap:10px;margin-top:11px}
.chip{flex:1;font-size:11px;line-height:1.4}
.chip .h{display:flex;align-items:center;gap:5px;font-weight:500;margin-bottom:2px}
.chip .h.up{color:var(--gold)}.chip .h.dn{color:var(--mut)}
.chip .d{color:var(--mut)}
.dot{width:6px;height:6px;border-radius:50%}
</style></head>
<body>
<main class="card" role="img" aria-label="@@name_en@@ AI proficiency card: 5-axis radar with gate / ability / throughput">
  <div class="hd"><div class="brand">@@brand@@</div><div class="tag">reality gate · @@glevel@@</div></div>
  <div class="name">@@name_en@@</div>
  <div class="zh">@@arch_zh@@</div>
  <div class="sub">@@sub@@</div>
  <svg class="radar" viewBox="-32 10 364 232" xmlns="http://www.w3.org/2000/svg">@@radar@@</svg>
  <div class="gauges">@@gauges@@</div>
  <div class="sec">count × difficulty · throughput</div>
  <div class="bar">@@bar@@</div>
  <div class="blabs">@@blabs@@</div>
  <div class="thru">@@thru@@</div>
  <div class="foot">
    <div class="sig">"@@sig@@"</div>
    <div class="chips">
      <div class="chip"><div class="h up"><span class="dot" style="background:var(--gold)"></span>strongest · @@s_name@@</div><div class="d">@@s_txt@@</div></div>
      <div class="chip"><div class="h dn"><span class="dot" style="background:var(--dim)"></span>to improve · @@w_name@@</div><div class="d">@@w_txt@@</div></div>
    </div>
  </div>
</main>
</body></html>
